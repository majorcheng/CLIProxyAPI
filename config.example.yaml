# 服务器绑定的主机/网卡地址。默认空字符串（""）表示绑定所有接口（IPv4 + IPv6）。
# 使用 "127.0.0.1" 或 "localhost" 可将访问限制在本机。
host: ""

# 服务器端口
port: 8317

# HTTPS 的 TLS 设置。启用后，服务器将使用提供的证书和私钥监听。
tls:
  enable: false
  cert: ""
  key: ""

# Management API 设置
remote-management:
  # 是否允许远程（非 localhost）访问管理接口。
  # 为 false 时，只有 localhost 能访问管理端点（但仍然需要密钥）。
  allow-remote: false

  # 管理密钥。如果这里填写明文，启动时会自动哈希。
  # 所有管理请求（包括来自 localhost 的请求）都必须携带该密钥。
  # 留空则完全禁用 Management API（所有 /v0/management 路由返回 404）。
  secret-key: ""

  # 为 true 时，禁用内置管理控制面板资源的下载和 HTTP 路由。
  disable-control-panel: false

  # 禁用从 GitHub 周期性后台自动更新管理面板（默认：false）。
  # 启用后，仅会在首次访问且面板缺失时下载，之后不再自动更新。
  # disable-auto-update-panel: false

  # 管理控制面板的 GitHub 仓库。支持仓库 URL 或 releases API URL。
  panel-github-repository: "https://github.com/router-for-me/Cli-Proxy-API-Management-Center"

# 认证目录（支持用 ~ 表示 home 目录）
auth-dir: "~/.cli-proxy-api"

# 用于鉴权的 API Key
api-keys:
  - "your-api-key-1"
  - "your-api-key-2"
  - "your-api-key-3"

# 禁止命中 priority=0 auth 的 client api-key 列表
# 这里填写的是上面顶层 api-keys 里的入站 key，不是上游 provider 的 token。
# 命中的 key 仍可访问代理，但请求选路时会直接跳过所有 priority=0 候选。
# priority-zero-disabled-api-keys:
#   - "your-api-key-2"

# 是否启用调试日志
debug: false

# 是否启用完整请求/响应日志落盘。
# 开启后会记录下游请求、上游请求、上游响应和最终回包，便于排查模型调用错误。
# 注意：它与 debug 不同。debug 只控制主日志里的摘要级别，不会自动记录完整请求/响应正文；
# 关闭时不会记录所有请求全文，但失败请求仍会按 error-logs-max-files 保留有限的错误日志。
request-log: false

# 启用 pprof HTTP 调试服务（host:port）。出于安全考虑，请保持仅绑定 localhost。
pprof:
  enable: false
  addr: "127.0.0.1:8316"

# 可选的后台清理任务：用于把终态失败后应被移除的 auth 文件移入垃圾站。
# auth-maintenance:
#   enable: true
#   scan-interval-seconds: 30
#   delete-interval-seconds: 5
#   # 自动移入垃圾站当前只对 Codex free 账号生效；plus / team / pro 不会因为
#   # auth-maintenance 的 delete 路径被自动移除。
#   # 如果省略 delete-status-codes，默认只会把 401/402/403/404 视为立即删除信号。
#   # 429（包括 team/free 周限这类可恢复额度状态）不会因为缺省配置被自动删除。
#   # 这里列出的任意状态码都会被视为“立即删除”信号。
#   # 例如：如果包含 429，则一次 429 响应就足以立刻禁用该 auth，
#   # 并将文件加入“移入垃圾站”的队列。quota-strike-threshold 不会延迟这条路径。
#   delete-status-codes: [401, 429]
#   # 对“refresh RT 失败导致的 401”做一层额外保护。
#   # 默认 true：refresh 401 不会直接按 401 删除，只有该 auth 已经具备 429 痕迹时才删除。
#   # 注意：这只是 refresh 401 的特殊分支，不等于开启了“普通 429 自动删除”。
#   # 也就是说：如果 delete-status-codes 里没有 429，且 delete-quota-exceeded=false，
#   # 那么普通 429 仍不会被自动删除；只有“refresh 401 + 已429”这类特殊情况会按 429 归因进入垃圾站。
#   # 因此你可能会看到文件进入 logs/delete/429/，但这并不代表当前配置已经打开了常规 429 删除。
#   # 显式设为 false 时，会回到“只要 delete-status-codes 含 401，就直接按 401 删除”的旧语义。
#   refresh-401-requires-429: true
#   # 为重复额度失败启用第二条删除路径。
#   # 这主要适用于 delete-status-codes 中不包含 429，且你希望 429
#   # 不是立刻删除，而是在多次命中后再删除的场景。
#   # 如果省略该项，默认是 false；也就是说 429 不会仅靠默认配置累计删除。
#   delete-quota-exceeded: true
#   # 上述 quota-exceeded 路径所需的最小 429 次数。
#   quota-strike-threshold: 6
#   #
#   # 常见模式：
#   # 1）普通 401 立即删除；普通 429 不立刻删，但 refresh 401 若已确认带有 429 痕迹，仍允许删除：
#   # delete-status-codes: [401]
#   # refresh-401-requires-429: true
#   # delete-quota-exceeded: true
#   # quota-strike-threshold: 6
#   #
#   # 2）401 和 429 都立即删除：
#   # delete-status-codes: [401, 429]
#   # refresh-401-requires-429: false
#   # delete-quota-exceeded: true
#   # quota-strike-threshold: 6

# 为 true 时，禁用高开销 HTTP 中间件特性，以降低高并发下的单请求内存开销。
commercial-mode: false

# 为 true 时，启用 Gemini CLI 内部端点（/v1internal:*）。
# 默认 false，更安全；只有明确需要本机 Gemini CLI 透传时再打开。
enable-gemini-cli-endpoint: false

# 为 true 时，将应用日志写入滚动文件而不是 stdout
logging-to-file: false

# logs 目录下日志文件的最大总大小（MB）。超过后会删除最旧的日志文件，
# 直到总大小回到限制内。设为 0 表示禁用。
logs-max-total-size-mb: 0

# 在禁用请求日志时保留的错误日志文件最大数量。
# 超过后会删除最旧的错误日志。默认 10。设为 0 表示禁用清理。
error-logs-max-files: 10

# 控制服务是否在内存中聚合请求数、成功/失败总数、
# token 使用量以及按模型统计的明细，用于管理端 usage 接口。
# 设为 false 可停止采集新的 usage 统计。
usage-statistics-enabled: false

# 控制内存中的 usage 快照多久落盘一次到 logs/usage-statistics.snapshot。
# 设为 0 表示禁用周期性落盘；启动恢复与关停保存仍然保留。
usage-statistics-persist-interval-seconds: 30

# 仅保留最近 N 个本地自然日的数据到内存与快照文件中。
# 设为 0 表示历史无限保留。
usage-statistics-retention-days: 0

# 代理 URL。支持 socks5/http/https 协议。示例：socks5://user:pass@192.168.1.1:1080/
# 单个条目的 proxy-url 也支持 "direct" 或 "none"，用于显式绕过全局 proxy-url 和环境代理。
proxy-url: ""

# 是否允许新的 Codex auth 文件在首次入池时，先做一次后台初始 refresh，
# 用来优先校准 access_token、refresh_token、expired、last_refresh 等字段。
# 该行为只对“新文件首次提交”生效；普通 update、重启恢复和 refresh 成功后的 RT 轮转
# 都不会再次触发。若首次 refresh 遇到网络/5xx 等瞬态问题，会保留待处理标记并继续重试，
# 直到成功或命中终态失败。
# 默认 false；关闭时仍保持现有保守门控：只有 token JSON 明确显示需要刷新时才会自动 refresh。
# 该开关不会让请求路径在 401 时现场补刷并重放。
# codex-initial-refresh-on-load: false

# 为 true 时，不带前缀的模型请求只会使用没有 prefix 的凭证（prefix == model name 的情况除外）。
force-model-prefix: false

# 为 true 时，将过滤后的上游响应头透传给下游客户端。
# 默认 false（关闭）。
passthrough-headers: false

# 可选的异步审计 hook，用于外部分析请求体特征和执行结果。
# 支持 http(s) 端点以及通过 unix:///path/to/hook.sock 指定的 Unix domain socket。
# request-audit:
#   enable: false
#   endpoint: "unix:///tmp/cliproxy-codex-audit.sock"
#   providers:
#     - codex
#   queue-size: 256
#   timeout-seconds: 5
#   # JSON 请求/响应体会先压缩再截断：
#   # 数组超过 6 个元素时保留前 3 个和后 3 个；
#   # 字符串超过 100 个字符时保留前 50 个和后 50 个。
#   max-body-bytes: 262144

# 请求重试次数。当 HTTP 响应码为 403、408、500、502、503 或 504 时会重试。
request-retry: 3

# 单个失败请求最多尝试多少个不同的凭证。
# 设为 0 表示保持旧行为（尝试所有可用凭证）。
max-retry-credentials: 0

# 在调用方侧请求错误后，最多额外尝试多少次不同凭证
# （例如 invalid_request_error、invalid_json_schema、unsupported parameter
# 或 invalid image data）。设为 0 表示首次此类错误后立即停止。
max-invalid-request-retries: 0

# 对已冷却凭证触发重试前允许等待的最大秒数。
max-retry-interval: 30

# 为 true 时，关闭 auth/model 冷却调度；失败后不会进入 blackout 窗口。
# 这主要用于调试、外部调度自行控速，或明确不希望 401/403/404/429 暂停凭证的场景。
disable-cooling: false

# 为 true 时，当 priority=0 的 OAuth/token auth 仅出现纯传输层/网络抖动时，
# 会停止在同一请求内继续重试其他 priority=0 OAuth/token auth，
# 转而回落到更低优先级的 compat provider。默认关闭。
shared-exit-priority-zero-oauth-network-jitter-fallback: false

# 额度超限行为
quota-exceeded:
  switch-project: true # 配额超限时是否自动切换到其他 project
  switch-preview-model: true # 配额超限时是否自动切换到 preview 模型

# 多个凭证同时匹配时的选路策略。
routing:
  strategy: "round-robin" # round-robin（默认）、fill-first、success-rate、simhash
  # priority-zero-strategy: "fill-first" # 仅当当前命中的最高 priority bucket 为 0 时覆盖 strategy；支持 round-robin / fill-first，留空表示跟随 strategy
  # max-inflight-per-auth: 5    # 单个 auth 同时允许的最大进行中请求数；0 表示不限制
  # success-rate:
  #   half-life-seconds: 1800 # success rate 打分的 EMA 半衰期（默认：1800）
  #   explore-rate: 0.02      # 随机探索某个凭证的概率 [0,1]（默认：0.02）
  # simhash:
  #   pool-size: 10               # simhash 路由使用的全局虚拟池大小
  #   admit-cooldown-seconds: 1   # 虚拟池至少填满一次后，限制新可用 auth 进入池子的频率

# 为 true 时，启用 WebSocket API（/v1/ws）的鉴权。
ws-auth: false

# > 0 时，非流式响应每 N 秒输出一个空行，用于避免空闲超时。
nonstream-keepalive-interval: 0

# 流式行为配置（SSE keep-alive + 安全 bootstrap 重试）。
# streaming:
#   keepalive-seconds: 15   # 默认：0（关闭）。<= 0 表示禁用 keep-alive。
#   bootstrap-retries: 1    # 默认：0（关闭）。仅在首字节发送前允许重试。

