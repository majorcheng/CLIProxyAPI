# Amp 集成
# ampcode:
#   # 配置 Amp CLI OAuth 和管理功能的上游 URL
#   upstream-url: "https://ampcode.com"
#   # 可选：覆盖 Amp 上游 API key（否则使用环境变量或文件）
#   upstream-api-key: ""
#   # 按客户端划分的上游 API key 映射
#   # 将客户端 API key（来自顶层 api-keys）映射到不同的 Amp 上游 API key。
#   # 适用于不同客户端需要使用不同 Amp 账号/额度的场景。
#   # 如果某个客户端 key 没有命中映射，则回退到 upstream-api-key（默认行为）。
#   upstream-api-keys:
#     - upstream-api-key: "amp_key_for_team_a"    # 这些客户端使用的上游 key
#       api-keys:                                 # 会使用该上游 key 的客户端 key
#         - "your-api-key-1"
#         - "your-api-key-2"
#     - upstream-api-key: "amp_key_for_team_b"
#       api-keys:
#         - "your-api-key-3"
#   # 是否将 Amp 管理路由（/api/auth、/api/user 等）限制为仅 localhost 访问（默认：false）
#   restrict-management-to-localhost: false
#   # 是否在检查本地 API key 之前强制先应用 model mapping（默认：false）
#   force-model-mappings: false
#   # Amp 模型映射
#   # 将不可用的 Amp 模型路由到你本地代理中可用的替代模型。
#   # 适用于 Amp CLI 请求了你无权使用的模型（例如 Claude Opus 4.5），
#   # 但你本地还有类似的可用模型（例如 Claude Sonnet 4）这种场景。
#   model-mappings:
#     - from: "claude-opus-4-5-20251101"          # Amp CLI 请求的模型
#       to: "gemini-claude-opus-4-5-thinking"     # 改路由到这个可用模型
#     - from: "claude-sonnet-4-5-20250929"
#       to: "gemini-claude-sonnet-4-5-thinking"
#     - from: "claude-haiku-4-5-20251001"
#       to: "gemini-2.5-flash"

# 全局 OAuth 模型名别名（按 channel 维度）
# 这些别名会同时影响模型列表展示和请求路由时使用的模型 ID。
# 支持的 channel：gemini-cli、vertex、aistudio、antigravity、claude、codex、qwen、iflow、kimi。
# 注意：别名不会作用于 gemini-api-key、codex-api-key、claude-api-key、openai-compatibility、vertex-api-key 或 ampcode。
# 你可以为同一个上游名称重复配置多个别名，以暴露多个客户端模型名。
# oauth-model-alias:
#   gemini-cli:
#     - name: "gemini-2.5-pro"          # 该 channel 下的原始模型名
#       alias: "g2.5p"                  # 面向客户端的别名
#       fork: true                      # 为 true 时，保留原始名称，并额外暴露该 alias（默认：false）
#   vertex:
#     - name: "gemini-2.5-pro"
#       alias: "g2.5p"
#   aistudio:
#     - name: "gemini-2.5-pro"
#       alias: "g2.5p"
#   antigravity:
#     - name: "gemini-3-pro-high"
#       alias: "gemini-3-pro-preview"
#   claude:
#     - name: "claude-sonnet-4-5-20250929"
#       alias: "cs4.5"
#   codex:
#     - name: "gpt-5"
#       alias: "g5"
#   qwen:
#     - name: "qwen3-coder-plus"
#       alias: "qwen-plus"
#   iflow:
#     - name: "glm-4.7"
#       alias: "glm-god"
#   kimi:
#     - name: "kimi-k2.5"
#       alias: "k2.5"

# OAuth provider 排除模型
# oauth-excluded-models:
#   gemini-cli:
#     - "gemini-2.5-pro"     # 排除特定模型（精确匹配）
#     - "gemini-2.5-*"       # 通配符前缀匹配（例如 gemini-2.5-flash、gemini-2.5-pro）
#     - "*-preview"          # 通配符后缀匹配（例如 gemini-3-pro-preview）
#     - "*flash*"            # 通配符子串匹配（例如 gemini-2.5-flash-lite）
