# Claude API 请求的默认请求头。Claude Code 发布新版本时请同步更新。
# 在 legacy 模式下，当客户端未显式传递时，user-agent/package-version/runtime-version/timeout
# 会作为兜底值使用，而 OS/arch 仍然来自运行时。当启用
# stabilize-device-profile 时，OS/arch 会固定为下面的基线值，
# 而 user-agent/package-version/runtime-version 则用于生成软件指纹，
# 该指纹仍然可以升级到更新的官方 Claude 客户端版本。
# claude-header-defaults:
#   user-agent: "claude-cli/2.1.44 (external, sdk-cli)"
#   package-version: "0.74.0"
#   runtime-version: "v24.3.0"
#   os: "MacOS"
#   arch: "arm64"
#   timeout: "600"
#   stabilize-device-profile: false  # 可选，默认 false；设为 true 启用按 auth/API-key 维度固定的指纹

# Codex OAuth 模型请求的默认请求头。
# 仅用于文件型/OAuth Codex 请求，且仅在客户端未传该 header 时生效。
# `user-agent` 同时作用于 HTTP 和 websocket 请求；
# `beta-features` 仅作用于 websocket 请求。它们不适用于 codex-api-key 条目。
# codex-header-defaults:
#   user-agent: "codex_cli_rs/0.114.0 (Mac OS 14.2.0; x86_64) vscode/1.111.0"
#   beta-features: "multi_agent"

